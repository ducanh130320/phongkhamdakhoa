#push code
name: Build and deploy FE Image

on:
  push:
    branches: [master]

permissions:
  contents: read
  packages: write
  actions: read
  
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      DOCKER_CONTAINER: "ctn_easyvietnamese-fe"
      DOCKER_IMAGE: "img_easyvietnamese-fe:v1"
      DOCKERFILE_PATH: "Dockerfile"
      DOCKER_TAR: "img_easyvietnamese-fe.tar"
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Build docker image
        run: |
          docker build -t $DOCKER_IMAGE -f $DOCKERFILE_PATH .

      - name: Save Docker image to tar
        run: |
          docker save $DOCKER_IMAGE -o $DOCKER_TAR

      - name: Copy Docker image to EC2
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          source: ${{ env.DOCKER_TAR }}
          target: "/home/${{ secrets.EC2_USER }}/"
          
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            sudo -i <<'EOF'
            DOCKER_TAR="/home/${{ secrets.EC2_USER }}/img_easyvietnamese-fe.tar"
            DOCKER_CONTAINER="ctn_easyvietnamese-fe"
            DOCKER_IMAGE="img_easyvietnamese-fe:v1"
            
            docker rm -f $DOCKER_CONTAINER 2>/dev/null || true
            docker rmi -f $DOCKER_IMAGE 2>/dev/null || true
            docker load -i $DOCKER_TAR
            
            cd /projects/Easyvietnamese-FE/
            docker compose up -d --pull=never
            docker image prune -f
            docker builder prune -f
            EOF
